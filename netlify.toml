[build]
  command = "npm run build"
  publish = ".next"

# pdfjs-dist (via pdf-parse, used for document text extraction) requires
# Promise.withResolvers, which only exists on Node 22+. Pin it so build and the
# serverless runtime both use a Node that supports it.
[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
